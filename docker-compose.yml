services:

  frontend:
    build: ./ReactFrontend

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build: ./NodeBackend

    ports:
      - "3002:3002"
      
    env_file:
      - ./NodeBackend/.env.production

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dam
      DB_USER: admin
      DB_PASSWORD: Admin123
      DB_URL: postgres://admin:Admin123@postgres:5432/dam

    depends_on:
      - postgres
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: dam
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      
  minio:
    image: quay.io/minio/aistor/minio:RELEASE.2026-06-06T02-44-06Z
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    #env_file: .env_production
    restart: always
    
 worker:
    build: ./worker
    env_file:
      - ./worker/.env.production
 depends_on:
      - postgres

 rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitMQ
    restart: always
    environment:
      # This tells RabbitMQ to listen on port 73 internally
      - RABBITMQ_NODE_PORT=73
      - RABBITMQ_DIST_PORT=25672
    ports:
      - "73:73"           # Host Port 73 -> Container Port 73
      - "15672:15672"     # Management UI (Dashboard)
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:
  
  
 